---
# Single GatewayClass for the cluster's one Gateway. Points at the EnvoyProxy
# below, so all data-plane tuning lives in one place.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: default
    namespace: gateway
---
# Data-plane config for the `envoy` class. One replica by default; a multi-node
# cluster can bump it with a `patches:` entry on that cluster's infra-configs
# Kustomization (clusters/<name>/infrastructure.yaml) — no overlay folder needed.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: default
  namespace: gateway
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 1
---
# The cluster's single entrypoint, on the standard web ports (80 / 443). Apps opt
# in by pointing an HTTPRoute's parentRef here (name: envoy, namespace: network).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy
  namespace: gateway
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS — uncomment once cert-manager is issuing a cert into this namespace.
    # Leaving it off until then keeps the Gateway healthy (a listener with a
    # missing certificateRef never goes Ready and would stall infra-configs).
    # - name: https
    #   protocol: HTTPS
    #   port: 443
    #   allowedRoutes:
    #     namespaces:
    #       from: All
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - kind: Secret
    #         name: wildcard-tls
