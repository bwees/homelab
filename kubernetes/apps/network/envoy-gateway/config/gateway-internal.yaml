---
# Internal network — LAN / Tailscale-only entrypoint. Same IP as the external
# Gateway, but on alternate ports (8080 / 8443) you do NOT forward publicly.
# Apps opt in via an HTTPRoute parentRef of envoy-internal (e.g. Jellyfin).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-internal
  namespace: network
spec:
  gatewayClassName: envoy
  # ── Shared LoadBalancer IP (left unassigned for now) ──────────────────────
  # Must resolve to the SAME IP as gateway-external.yaml — only the ports differ.
  # See gateway-external.yaml for the full explanation. When you assign IPs,
  # use the identical value and "shared IP" key here.
  #
  # addresses:
  #   - type: IPAddress
  #     value: 10.0.0.10
  # infrastructure:
  #   annotations:
  #     # MetalLB:
  #     # metallb.universe.tf/loadBalancerIPs: 10.0.0.10
  #     # metallb.universe.tf/allow-shared-ip: envoy-shared
  #     # Cilium LB-IPAM:
  #     # lbipam.cilium.io/ips: 10.0.0.10
  #     # lbipam.cilium.io/sharing-key: envoy-shared
  # ──────────────────────────────────────────────────────────────────────────
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS — enable once cert-manager is issuing a cert into this namespace.
    # - name: https
    #   protocol: HTTPS
    #   port: 8443
    #   allowedRoutes:
    #     namespaces:
    #       from: All
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - kind: Secret
    #         name: wildcard-tls
