# Two Flux Kustomizations so the controller (which installs the Gateway API +
# EnvoyProxy CRDs) is fully Ready before the config (GatewayClass / EnvoyProxy /
# Gateways, which are instances of those CRDs) is applied.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/network/envoy-gateway/app
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
  dependsOn:
    - name: envoy-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/network/envoy-gateway/config
