apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: network
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
    namespace: flux-system
  # The chart bundles the Gateway API + Envoy Gateway CRDs; let Flux manage them.
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
