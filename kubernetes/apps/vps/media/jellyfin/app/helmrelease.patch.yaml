apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  interval: 1h
  values:
    route:
      main:
        parentRefs:
          - name: envoy
            namespace: gateway
        hostnames:
          - jellyfin.test.lab
        rules:
          - backendRefs:
              - identifier: main
                port: 8096

    persistence:
      config:
        existingClaim: jellyfin-config
        globalMounts:
          - path: /config
      media:
        existingClaim: media-library
        globalMounts:
          - path: /media
