---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-tau-ceti
spec:
  chartRef:
    kind: OCIRepository
    name: external-dns-tau-ceti
  interval: 1h
  values:
    provider:
      name: pdns
    env:
      - name: EXTERNAL_DNS_PDNS_API_KEY
        valueFrom:
          secretKeyRef:
            name: powerdns-api
            key: PDNS_API_KEY
    extraArgs:
      - --pdns-server=http://dns.tail72746.ts.net:8081
      - --pdns-api-key=$(EXTERNAL_DNS_PDNS_API_KEY)
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --gateway-name=envoy-internal
    triggerLoopOnEvent: true
    policy: sync
    sources:
      - crd
      - gateway-httproute
    txtOwnerId: ${CLUSTER}
    txtPrefix: k8s.%{record_type}-
    domainFilters:
      - wees.home
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
