apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: jellyfin
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: '10.11.11'
            env:
              TZ: America/New_York
              JELLYFIN_PublishedServerUrl: jellyfin.wees.home
              # LSCR.io compatability mounts
              JELLYFIN_CONFIG_DIR: /config
              JELLYFIN_DATA_DIR: /config/data
              JELLYFIN_LOG_DIR: /config/log
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
            resources:
              requests:
                cpu: 50m
                memory: 1Gi
              limits:
                memory: 2Gi
                gpu.intel.com/i915: '1'
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8096
                  timeoutSeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8096
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  failureThreshold: 30

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44
          - 303

    service:
      main:
        controller: main
        ports:
          http:
            port: 8096
            appProtocol: kubernetes.io/ws

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - jellyfin.wees.home
        rules:
          - backendRefs:
              - identifier: main
                port: 8096
            timeouts:
              request: 0s

    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /cache
                subPath: cache
              - path: /tmp
                subPath: tmp
              - path: /transcode
                subPath: transcode
      config:
        existingClaim: jellyfin-config
        globalMounts:
          - path: /config

      media:
        existingClaim: media-library
        globalMounts:
          - path: /media-library
