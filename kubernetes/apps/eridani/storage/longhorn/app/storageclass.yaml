---
# Storage class for VolSync's snapshots.
# Don't replicate across nodes and delete when done to prevent ballooning of storage usage.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-volsync-src
provisioner: driver.longhorn.io
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: '1'
  staleReplicaTimeout: '30'
  dataLocality: 'best-effort'
