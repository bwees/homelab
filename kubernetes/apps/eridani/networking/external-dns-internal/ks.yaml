apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns-internal
spec:
  interval: 1h
  path: ./kubernetes/apps/eridani/networking/external-dns-internal/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: powerdns
      namespace: networking
    - name: onepassword
      namespace: secrets
