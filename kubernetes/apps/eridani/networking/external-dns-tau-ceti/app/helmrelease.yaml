---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-tau-ceti
spec:
  chartRef:
    kind: OCIRepository
    name: external-dns-tau-ceti
  interval: 1h
  values:
    provider:
      name: pdns
    env:
      - name: EXTERNAL_DNS_PDNS_API_KEY
        valueFrom:
          secretKeyRef:
            name: powerdns-api
            key: PDNS_API_KEY
    extraArgs:
      - --pdns-server=http://dns.tail72746.ts.net:8081
      - --pdns-api-key=$(EXTERNAL_DNS_PDNS_API_KEY)
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --txt-wildcard-replacement=star
    triggerLoopOnEvent: true
    policy: sync
    # crd only: publishes the wees-home-tailnet DNSEndpoint (100.101.55.71, eridani's
    # tailnet IP) into tau-ceti's central powerdns so tailnet clients reach envoy
    # directly instead of via the 10.0.1.2 LAN route.
    sources:
      - crd
    txtOwnerId: ${CLUSTER}
    txtPrefix: k8s.%{record_type}-
    domainFilters:
      - wees.home
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
