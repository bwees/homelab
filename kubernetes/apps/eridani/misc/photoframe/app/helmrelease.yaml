apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: photoframe
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: photoframe
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/bwees/photoframe
              tag: latest
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes

    service:
      main:
        controller: main
        ports:
          http:
            port: 8000
            appProtocol: kubernetes.io/ws

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: networking
        hostnames:
          - frame.wees.home
        rules:
          - backendRefs:
              - identifier: main
                port: 8000

    persistence:
      data:
        existingClaim: photoframe-data
        globalMounts:
          - path: /app/static/images
