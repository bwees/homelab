apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library
spec:
  capacity:
    storage: 1Ti
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ''
  mountOptions:
    - nfsvers=4.1
    - nolock
    - soft
  nfs:
    server: 10.0.1.4
    path: /volume1/Media/immich
