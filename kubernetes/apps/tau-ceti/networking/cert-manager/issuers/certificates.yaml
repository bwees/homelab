---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bwees-lab-tls
  namespace: networking
spec:
  secretName: bwees-lab-tls
  duration: 2160h # 90d
  renewBefore: 720h # 30d
  commonName: '*.bwees.lab'
  dnsNames:
    - 'bwees.lab'
    - '*.bwees.lab'
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
  issuerRef:
    name: bwees-ca
    kind: ClusterIssuer
    group: cert-manager.io

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bwees-io-tls
  namespace: networking
spec:
  secretName: bwees-io-tls
  duration: 2160h # 90d
  renewBefore: 720h # 30d
  commonName: '*.bwees.io'
  dnsNames:
    - 'bwees.io'
    - '*.bwees.io'
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
  issuerRef:
    name: bwees-ca
    kind: ClusterIssuer
    group: cert-manager.io
