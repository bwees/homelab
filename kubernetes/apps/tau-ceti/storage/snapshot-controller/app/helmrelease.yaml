---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
spec:
  interval: 1h
  chart:
    spec:
      chart: snapshot-controller
      version: '5.1.0'
      sourceRef:
        kind: HelmRepository
        name: piraeus
        namespace: storage
  values:
    controller:
      replicas: 2
