apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gatus
spec:
  interval: 1h
  path: ./kubernetes/apps/tau-ceti/monitoring/gatus/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: onepassword
      namespace: external-secrets
  targetNamespace: monitoring
