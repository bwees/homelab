endpoints:
  - name: homelab-vps
    group: vps
    url: 'icmp://100.105.77.106'
    interval: 1m
    conditions:
      - '[CONNECTED] == true'
    alerts:
      - type: discord

  - name: beszel
    group: vps
    url: 'https://beszel.bwees.lab/'
    interval: 1m
    conditions:
      - '[STATUS] == 200'
    alerts:
      - type: discord

  - name: dns
    group: vps
    url: '100.102.42.104' # Address of the DNS server to use
    dns:
      query-name: 'nas.bwees.lab'
      query-type: 'A'
    conditions:
      - '[BODY] == 192.168.50.4'
      - '[DNS_RCODE] == NOERROR'
    alerts:
      - type: discord
