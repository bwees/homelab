apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gatus
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: gatus-secret
    template:
      data:
        GATUS_DISCORD_WEBHOOK: '{{ .discord_webhook }}'
  dataFrom:
    - extract:
        key: gatus

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gatus-ca
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: gatus-ca
  data:
    # private CA so gatus trusts the cert-manager-issued *.bwees.lab certs
    - secretKey: bwees-ca.crt
      remoteRef:
        key: certificate-authority
        property: bwees-ca.crt
