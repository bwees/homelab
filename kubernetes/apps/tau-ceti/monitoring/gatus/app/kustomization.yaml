apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ocirepository.yaml
  - helmrelease.yaml
  - externalsecret.yaml
  - pvc.yaml

configMapGenerator:
  - name: gatus-config
    files:
      - config/alerting.yml
      - config/bwees.yml
      - config/eridani.yml
      - config/maroonrides.yml
      - config/misc.yml
      - config/starforge.yml
      - config/stepien.yml
      - config/vps.yml

generatorOptions:
  disableNameSuffixHash: true
  annotations:
    # gatus expands ${GATUS_DISCORD_WEBHOOK} from its pod env at runtime — keep
    # flux's postBuild var substitution from blanking it out at build time.
    kustomize.toolkit.fluxcd.io/substitute: disabled
