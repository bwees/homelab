apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: beszel
spec:
  interval: 1h
  path: ./kubernetes/apps/tau-ceti/monitoring/beszel/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: longhorn
      namespace: storage
    - name: volsync
      namespace: storage
    - name: onepassword
      namespace: secrets
  components:
    - ../../../../../components/volsync
  postBuild:
    substitute:
      APP: beszel
      VOLSYNC_CLAIM: beszel-data
  targetNamespace: monitoring
