apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: beszel
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: beszel
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: henrygd/beszel
              tag: 0.18.7
            env:
              BESZEL_HUB_APP_URL: https://beszel.bwees.lab
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: 8090

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: networking
        hostnames:
          - beszel.bwees.lab
        rules:
          - backendRefs:
              - identifier: main
                port: 8090

    persistence:
      data:
        existingClaim: beszel-data
        globalMounts:
          - path: /beszel_data
