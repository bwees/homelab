---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      version: '1.98.4'
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
  values:
    # empty → chart uses the pre-created `operator-oauth` secret (ExternalSecret)
    oauth: {}
    operatorConfig:
      hostname: tailscale-operator-tau-ceti
      defaultTags:
        - tag:tau-ceti
        - tag:kube-operator
    proxyConfig:
      defaultTags:
        - tag:tau-ceti
        - tag:kube-service
