apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: readme-stats
spec:
  interval: 1h
  path: ./kubernetes/apps/tau-ceti/misc/readme-stats/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: onepassword
      namespace: secrets
  targetNamespace: misc
