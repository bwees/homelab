apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readme-stats
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: readme-stats
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: crusaders/github-readme-stats-docker
              tag: latest
            env:
              GITHUB_USER: bwees
            envFrom:
              - secretRef:
                  name: readme-stats-secret
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes

    service:
      main:
        controller: main
        ports:
          http:
            port: 80

    route:
      main:
        parentRefs:
          - name: envoy-external
            namespace: networking
        hostnames:
          - stats.bwees.io
        rules:
          - backendRefs:
              - identifier: main
                port: 80
