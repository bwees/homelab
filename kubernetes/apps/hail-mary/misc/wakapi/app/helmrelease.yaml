apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wakapi
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: wakapi
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/muety/wakapi
              tag: latest
            envFrom:
              - secretRef:
                  name: wakapi-secret
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
            appProtocol: kubernetes.io/ws

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - wakapi.bwees.lab
        rules:
          - backendRefs:
              - identifier: main
                port: 3000

    persistence:
      data:
        existingClaim: wakapi-data
        globalMounts:
          - path: /data
