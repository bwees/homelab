---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: networking
resources:
  - ../../../../base/networking/tailscale-operator/proxies
patches:
  # 2 replicas survive a single node going offline.
  - target:
      kind: ProxyGroup
      name: .*-ingress
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
