apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: powerdns-api
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: powerdns-api
    template:
      data:
        PDNS_API_KEY: '{{ .PDNS_API_KEY }}'
  dataFrom:
    - extract:
        key: powerdns
