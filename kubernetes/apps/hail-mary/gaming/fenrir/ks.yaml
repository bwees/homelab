---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fenrir
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  path: ./kubernetes/apps/hail-mary/gaming/fenrir/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: cert-manager
      namespace: networking
    - name: tailscale-operator
      namespace: networking
    - name: generic-device-plugin
      namespace: operators
  targetNamespace: gaming
