---
# yaml-language-server: $schema=https://github.com/games-on-whales/fenrir/raw/refs/heads/main/schemas/direwolf.games-on-whales.github.io/app_v1alpha1.json
# Sample streamable app to verify the pipeline end-to-end before adding games.
apiVersion: direwolf.games-on-whales.github.io/v1alpha1
kind: App
metadata:
  name: firefox
spec:
  id: 1
  isHDRSupported: false
  title: Firefox
  volumeClaimTemplate:
    spec: {}
  wolfConfig:
    runtimeVariables:
      renderNode: /dev/dri/renderD128
  template:
    spec:
      containers:
        - name: app
          image: ghcr.io/games-on-whales/firefox:edge
          resources:
            limits:
              squat.ai/dri: "1"
              cpu: 2000m
              memory: 4G
            requests:
              squat.ai/dri: "1"
              cpu: 2000m
              memory: 4G
          command:
            - /bin/bash
            - -c
            - |
              cleanup() {
                echo "Cleaning up..." >&2
                exit 0
              }
              trap cleanup SIGINT SIGTERM

              # The game container MUST wait for the Wayland display socket, or
              # it crash-loops and the Pod never becomes Ready.
              while [ ! -S $XDG_RUNTIME_DIR/$WAYLAND_DISPLAY ]; do
                echo "Waiting for wayland display..." >&2
                sleep 1
              done

              while [ ! -S $XDG_RUNTIME_DIR/pulse-socket ]; do
                echo "Waiting for pulse socket..." >&2
                sleep 1
              done

              export PULSE_SINK="$(pactl list sinks short | awk '$2 ~ /^virtual_sink/ {print $2; exit}')"
              export PULSE_SOURCE="${PULSE_SINK}.monitor"
              exec /entrypoint.sh
