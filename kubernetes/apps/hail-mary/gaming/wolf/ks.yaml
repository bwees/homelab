apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wolf
spec:
  interval: 1h
  path: ./kubernetes/apps/hail-mary/gaming/wolf/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    # need the tailscale operator to publish the `wolf` device
    - name: tailscale-operator
  targetNamespace: gaming
