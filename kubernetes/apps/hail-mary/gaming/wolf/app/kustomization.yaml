apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ocirepository.yaml
  - helmrelease.yaml

configMapGenerator:
  - name: wolf-config
    files:
      - config.toml

generatorOptions:
  disableNameSuffixHash: true
  annotations:
    # config.toml has no ${VAR}s; keep Flux postBuild off it regardless
    kustomize.toolkit.fluxcd.io/substitute: disabled
