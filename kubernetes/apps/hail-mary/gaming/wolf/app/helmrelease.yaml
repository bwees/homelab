---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wolf
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: wolf
  values:
    controllers:
      main:
        annotations:
          configmap.reloader.stakater.com/reload: wolf-config
        strategy: Recreate
        initContainers:
          # Merge the in-repo config with the live config, preserving paired_clients.
          merge-config:
            image:
              repository: ghcr.io/tomwright/dasel
              tag: 3.11.2-alpine
            command:
              - sh
              - -c
              - |
                set -u
                SRC=/cfg-src/config.toml
                LIVE=/etc/wolf/cfg/config.toml
                mkdir -p /etc/wolf/cfg
                if [ ! -f "$LIVE" ]; then
                  cp "$SRC" "$LIVE"
                  echo "wolf: seeded config from repo"
                elif dasel query -i toml -o toml --var live="toml:file:$LIVE" 'merge($this, {paired_clients: $live.paired_clients})' < "$SRC" > "$LIVE.new" 2>/dev/null; then
                  mv "$LIVE.new" "$LIVE"
                  echo "wolf: applied repo config, preserved paired_clients"
                else
                  rm -f "$LIVE.new"
                  echo "wolf: merge failed, kept existing live config"
                fi

        containers:
          main:
            image:
              repository: ghcr.io/games-on-whales/wolf
              tag: stable
            env:
              HOST_APPS_STATE_FOLDER: /etc/wolf
              XDG_RUNTIME_DIR: /run/user/wolf
            securityContext:
              privileged: true

    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: xenonite

    service:
      main:
        controller: main
        annotations:
          tailscale.com/expose: 'true'
          tailscale.com/hostname: wolf
        ports:
          https:
            port: 47989
            protocol: TCP
          http:
            port: 47984
            protocol: TCP
          rtsp:
            port: 48010
            protocol: TCP
          control:
            port: 47999
            protocol: UDP
          video:
            port: 48100
            protocol: UDP
          audio:
            port: 48200
            protocol: UDP

    persistence:
      wolf-config:
        type: configMap
        name: wolf-config
        advancedMounts:
          main:
            merge-config:
              - path: /cfg-src/config.toml
                subPath: config.toml
                readOnly: true

      wolf-state:
        type: hostPath
        hostPath: /etc/wolf
        hostPathType: DirectoryOrCreate
        advancedMounts:
          main:
            merge-config:
              - path: /etc/wolf
            main:
              - path: /etc/wolf

      wolf-run:
        type: hostPath
        hostPath: /run/user/wolf
        hostPathType: DirectoryOrCreate
        advancedMounts:
          main:
            main:
              - path: /run/user/wolf

      dockersock:
        type: hostPath
        hostPath: /var/run/docker.sock
        hostPathType: Socket
        advancedMounts:
          main:
            main:
              - path: /var/run/docker.sock

      dev:
        type: hostPath
        hostPath: /dev
        hostPathType: Directory
        advancedMounts:
          main:
            main:
              - path: /dev

      udev:
        type: hostPath
        hostPath: /run/udev
        hostPathType: Directory
        advancedMounts:
          main:
            main:
              - path: /run/udev
