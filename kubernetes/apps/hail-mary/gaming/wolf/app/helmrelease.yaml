---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wolf
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: wolf
  values:
    controllers:
      main:
        annotations:
          configmap.reloader.stakater.com/reload: wolf-config
        strategy: Recreate
        initContainers:
          # Merge the in-repo config with the live config, preserving paired_clients.
          merge-config:
            image:
              repository: ghcr.io/tomwright/dasel
              tag: 3.11.2-alpine
            command:
              - sh
              - -c
              - |
                set -u
                SRC=/cfg-src/config.toml
                LIVE=/etc/wolf/cfg/config.toml
                mkdir -p /etc/wolf/cfg
                if [ ! -f "$LIVE" ]; then
                  cp "$SRC" "$LIVE"
                  echo "wolf: seeded config from repo"
                  exit 0
                fi
                work="$LIVE.new"
                cp "$LIVE" "$work"
                ok=1
                for key in hostname config_version profiles gstreamer; do
                  val=$(dasel -f "$SRC" -r toml -w json "$key" 2>/dev/null) || { ok=0; break; }
                  dasel put -f "$work" -o "$work" -r toml -w toml -t json -v "$val" "$key" 2>/dev/null || { ok=0; break; }
                done
                if [ "$ok" = 1 ]; then
                  mv "$work" "$LIVE"
                  echo "wolf: applied repo config, preserved paired_clients"
                else
                  rm -f "$work"
                  echo "wolf: merge failed, kept existing live config"
                fi

        containers:
          main:
            image:
              repository: ghcr.io/games-on-whales/wolf
              tag: stable
            env:
              HOST_APPS_STATE_FOLDER: /etc/wolf
              XDG_RUNTIME_DIR: /run/user/wolf
            securityContext:
              privileged: true

    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: xenonite

    service:
      main:
        controller: main
        annotations:
          tailscale.com/expose: 'true'
          tailscale.com/hostname: wolf
        ports:
          https:
            port: 47989
            protocol: TCP
          http:
            port: 47984
            protocol: TCP
          rtsp:
            port: 48010
            protocol: TCP
          control:
            port: 47999
            protocol: UDP
          video:
            port: 48100
            protocol: UDP
          audio:
            port: 48200
            protocol: UDP

    persistence:
      wolf-config:
        type: configMap
        name: wolf-config
        advancedMounts:
          main:
            merge-config:
              - path: /cfg-src/config.toml
                subPath: config.toml
                readOnly: true

      wolf-state:
        type: hostPath
        hostPath: /etc/wolf
        hostPathType: DirectoryOrCreate
        advancedMounts:
          main:
            merge-config:
              - path: /etc/wolf
            main:
              - path: /etc/wolf

      wolf-run:
        type: hostPath
        hostPath: /run/user/wolf
        hostPathType: DirectoryOrCreate
        advancedMounts:
          main:
            main:
              - path: /run/user/wolf

      dockersock:
        type: hostPath
        hostPath: /var/run/docker.sock
        hostPathType: Socket
        advancedMounts:
          main:
            main:
              - path: /var/run/docker.sock

      dev:
        type: hostPath
        hostPath: /dev
        hostPathType: Directory
        advancedMounts:
          main:
            main:
              - path: /dev

      udev:
        type: hostPath
        hostPath: /run/udev
        hostPathType: Directory
        advancedMounts:
          main:
            main:
              - path: /run/udev
