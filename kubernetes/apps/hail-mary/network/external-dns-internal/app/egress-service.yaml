---
# Tailscale operator egress: maps the PowerDNS `dns` tailnet device into the
# cluster so pods can reach its API without MagicDNS / tailnet routing.
apiVersion: v1
kind: Service
metadata:
  name: powerdns
  namespace: network
  annotations:
    tailscale.com/tailnet-fqdn: dns.taila72746.ts.net
spec:
  type: ExternalName
  externalName: placeholder # operator replaces this with a ClusterIP proxy
  ports:
    - name: api
      port: 8081
      targetPort: 8081
      protocol: TCP
