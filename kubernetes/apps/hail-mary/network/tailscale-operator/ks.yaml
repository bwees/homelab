---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale-operator
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  prune: true
  wait: true # wait for the HelmRelease (and its CRDs) to be ready
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/hail-mary/network/tailscale-operator/app
  targetNamespace: tailscale
  dependsOn:
    - name: onepassword
      namespace: external-secrets

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale-operator-proxies
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: false
  dependsOn:
    - name: tailscale-operator
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/hail-mary/network/tailscale-operator/proxies
