apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shelfarr
spec:
  interval: 1h
  path: ./kubernetes/apps/hail-mary/media/shelfarr/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: longhorn
      namespace: storage
    - name: volsync
      namespace: storage
    - name: onepassword
      namespace: secrets
    - name: media-library
    - name: tailscale
  components:
    - ../../../../../components/volsync
  postBuild:
    substitute:
      APP: shelfarr
      VOLSYNC_CLAIM: shelfarr-config
  targetNamespace: media
