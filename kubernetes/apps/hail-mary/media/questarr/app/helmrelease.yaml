apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: questarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: questarr
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/doezer/questarr
              tag: 'v1.4.0-rc2'
            env:
              TZ: America/Chicago
              SQLITE_DB_PATH: /app/data/questarr.db
            envFrom:
              - secretRef:
                  name: questarr-secret
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
            resources:
              requests:
                cpu: 50m
                memory: 1Gi
              limits:
                memory: 2Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /login
                    port: 5000
              readiness: *probes

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: 5000
            appProtocol: kubernetes.io/ws

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - questarr.bwees.lab
        rules:
          - backendRefs:
              - identifier: main
                port: 5000

    persistence:
      config:
        existingClaim: questarr-config
        globalMounts:
          - path: /app/data
      media:
        existingClaim: media-library
        globalMounts:
          - path: /games
            subPath: games
          - path: /downloads
            subPath: downloads
