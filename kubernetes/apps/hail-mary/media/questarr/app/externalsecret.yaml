apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: questarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: questarr-secret
    template:
      data:
        IGDB_CLIENT_ID: '{{ .igdb_client_id }}'
        IGDB_CLIENT_SECRET: '{{ .igdb_client_secret }}'
  dataFrom:
    - extract:
        key: questarr
