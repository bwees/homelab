apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prowlarr
spec:
  interval: 1h
  path: ./kubernetes/apps/hail-mary/media/prowlarr/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: miroir-config
      namespace: storage
    - name: volsync
      namespace: storage
    - name: onepassword
      namespace: secrets
    - name: tailscale
  components:
    - ../../../../../components/volsync
  postBuild:
    substitute:
      APP: prowlarr
      VOLSYNC_CLAIM: prowlarr-config
  targetNamespace: media
