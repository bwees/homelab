apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pinchflat
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: pinchflat
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/kieraneglin/pinchflat
              tag: latest@sha256:01b4f98aabaf3f5fe394213f7a32578c9e84e42080f52e2f8334021a4473b202
            env:
              TZ: America/Chicago
              LOG_LEVEL: info
              EXPOSE_FEED_ENDPOINTS: 'true'
            envFrom:
              - secretRef:
                  name: pinchflat-secret
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: 8945
              readiness: *probes

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: 8945
            appProtocol: kubernetes.io/ws

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: networking
        hostnames:
          - pinchflat.bwees.lab
        rules:
          - backendRefs:
              - identifier: main
                port: 8945

    persistence:
      config:
        existingClaim: pinchflat-config
        globalMounts:
          - path: /config
      media:
        existingClaim: media-library
        globalMounts:
          - path: /downloads
            subPath: pinchflat
