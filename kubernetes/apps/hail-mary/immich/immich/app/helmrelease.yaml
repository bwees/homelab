---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: immich
  values:
    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi

    immich:
      persistence:
        library:
          existingClaim: immich-library

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44
          - 303

    controllers:
      main:
        containers:
          main:
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - NET_RAW
            env:
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: host
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: password
              TZ: America/Chicago
            image:
              # renovate: datasource=docker depName=ghcr.io/immich-app/immich-server
              tag: 'v3.0.0-rc.3'

    server:
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 100m
                  memory: 1.5Gi
                limits:
                  memory: 3Gi
                  gpu.intel.com/i915: '1'
      route:
        main:
          parentRefs:
            - name: envoy-external
              namespace: network
            - name: envoy-internal
              namespace: network
          hostnames:
            - photos.bwees.io
            - immich.bwees.lab
          rules:
            - backendRefs:
                - identifier: main
                  port: 2283

    machine-learning:
      controllers:
        main:
          strategy: Recreate
          containers:
            main:
              image:
                # renovate: datasource=docker depName=ghcr.io/immich-app/immich-machine-learning
                tag: 'v3.0.0-rc.3-openvino'
              env:
                GUNICORN_CMD_ARGS: '--no-control-socket'
              resources:
                requests:
                  cpu: 100m
                  memory: 2Gi
                limits:
                  memory: 4Gi
                  gpu.intel.com/i915: '1'

      persistence:
        cache:
          type: persistentVolumeClaim
          existingClaim: immich-ml-cache
