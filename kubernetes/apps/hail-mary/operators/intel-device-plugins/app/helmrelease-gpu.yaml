---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugins-gpu
spec:
  interval: 1h
  dependsOn:
    - name: intel-device-plugins-operator
  chart:
    spec:
      chart: intel-device-plugins-gpu
      version: 0.36.0
      sourceRef:
        kind: HelmRepository
        name: intel
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    name: gpudeviceplugin
    annotations: {}
    # Maximum of 16 pods can use this resource
    sharedDevNum: 16
    nodeFeatureRule: true
    nodeSelector:
      intel.feature.node.kubernetes.io/gpu: 'true'
