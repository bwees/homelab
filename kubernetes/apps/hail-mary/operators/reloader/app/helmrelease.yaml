---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
spec:
  interval: 1h
  chart:
    spec:
      chart: reloader
      version: '2.2.12'
      sourceRef:
        kind: HelmRepository
        name: reloader
        namespace: operators
  values:
    fullnameOverride: reloader
    reloader:
      # only act on resources opted in via reloader.stakater.com/* annotations
      watchGlobally: true
      readOnlyRootFileSystem: true
      deployment:
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
