---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
spec:
  interval: 1h
  chart:
    spec:
      chart: descheduler
      version: '0.36.0'
      sourceRef:
        kind: HelmRepository
        name: descheduler
        namespace: operators
  values:
    # Run continuously as a Deployment rather than a CronJob.
    kind: Deployment
    replicas: 1
    # How often the descheduler reconciles node balance.
    deschedulingInterval: 1h

    deschedulerPolicy:
      profiles:
        - name: default
          pluginConfig:
            - name: DefaultEvictor
              args:
                nodeFit: true
            - name: RemovePodsHavingTooManyRestarts
              args:
                podRestartThreshold: 100
                includingInitContainers: true
            - name: RemovePodsViolatingNodeAffinity
              args:
                nodeAffinityType:
                  - requiredDuringSchedulingIgnoredDuringExecution
            # The following plugins take no args, but v1alpha2 still requires a
            # pluginConfig entry for every plugin enabled below.
            - name: RemoveDuplicates
            - name: RemovePodsViolatingTopologySpreadConstraint
            - name: RemovePodsViolatingNodeTaints
            - name: RemovePodsViolatingInterPodAntiAffinity
            - name: LowNodeUtilization
              args:
                # Nodes below these % (of requests vs allocatable) are
                # underutilized; pods are moved off nodes above the targets.
                thresholds:
                  cpu: 20
                  memory: 20
                  pods: 20
                targetThresholds:
                  cpu: 50
                  memory: 50
                  pods: 50
          plugins:
            balance:
              enabled:
                - RemoveDuplicates
                - RemovePodsViolatingTopologySpreadConstraint
                - LowNodeUtilization
            deschedule:
              enabled:
                - RemovePodsHavingTooManyRestarts
                - RemovePodsViolatingNodeTaints
                - RemovePodsViolatingNodeAffinity
                - RemovePodsViolatingInterPodAntiAffinity

    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 256Mi
