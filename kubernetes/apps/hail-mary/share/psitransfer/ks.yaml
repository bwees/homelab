apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: psitransfer
spec:
  interval: 1h
  path: ./kubernetes/apps/hail-mary/share/psitransfer/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: onepassword
      namespace: secrets
  targetNamespace: share
