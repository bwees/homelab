apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-mirror
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: gitea-mirror-secret
    template:
      data:
        BETTER_AUTH_SECRET: '{{ .auth_secret }}'
  dataFrom:
    - extract:
        key: gitea-mirror
