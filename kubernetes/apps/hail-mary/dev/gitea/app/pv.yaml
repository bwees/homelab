---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nas-gitea
spec:
  capacity:
    storage: 100Gi
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - nolock
    - soft
  nfs:
    server: nas.bwees.lab
    path: /gitea
