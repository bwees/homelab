apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: gitea
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: gitea/gitea
              tag: '1.26'
            env:
              USER_UID: '1000'
              USER_GID: '1000'
              TZ: America/Chicago
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes

    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
            appProtocol: kubernetes.io/ws

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - git.bwees.lab
        rules:
          - backendRefs:
              - identifier: main
                port: 3000

    persistence:
      data:
        existingClaim: gitea-data
        globalMounts:
          - path: /data
