---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-connect
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: onepassword-connect
  values:
    connect:
      credentialsName: onepassword-connect-secret
      api:
        httpPort: 80
        imageRepository: ghcr.io/1password/connect-api
      sync:
        imageRepository: ghcr.io/1password/connect-sync
