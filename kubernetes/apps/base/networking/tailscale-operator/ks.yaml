---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale-operator
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  prune: true
  wait: true # wait for the HelmRelease (and its CRDs) to be ready
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/base/networking/tailscale-operator/app
  targetNamespace: networking
  dependsOn:
    - name: onepassword
      namespace: secrets
