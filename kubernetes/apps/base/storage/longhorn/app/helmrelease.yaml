---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: '1.12.0'
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: storage
  values:
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: ${LONGHORN_DATA_REPLICAS}
      createDefaultDiskLabeledNodes: true
      replicaSoftAntiAffinity: false
      storageMinimalAvailablePercentage: 15

    persistence:
      defaultClass: true
      defaultClassReplicaCount: ${LONGHORN_DATA_REPLICAS}
      reclaimPolicy: Retain

    # tolerations are a no-op on clusters without the dedicated=storage taint
    # (single-node clusters); on hail-mary they let manager/driver run on the
    # tainted, storage-free astrophage node
    longhornManager:
      tolerations:
        - key: dedicated
          operator: Equal
          value: storage
          effect: NoSchedule
    longhornDriver:
      tolerations:
        - key: dedicated
          operator: Equal
          value: storage
          effect: NoSchedule

    csi:
      attacherReplicaCount: ${LONGHORN_CSI_REPLICAS}
      provisionerReplicaCount: ${LONGHORN_CSI_REPLICAS}
      resizerReplicaCount: ${LONGHORN_CSI_REPLICAS}
      snapshotterReplicaCount: ${LONGHORN_CSI_REPLICAS}
