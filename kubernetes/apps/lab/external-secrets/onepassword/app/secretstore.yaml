---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepasswordSDK:
      vault: Homelab Deployment   # <-- set to your 1Password vault name
      auth:
        serviceAccountSecretRef:
          # bootstrap secret — create it out of band (see notes); NOT committed
          name: onepassword-secret-token
          key: token
          namespace: external-secrets
      integrationInfo:
        name: external-secrets
        version: v1.0.0
