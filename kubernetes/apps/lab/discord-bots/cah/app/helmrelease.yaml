apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cah
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: cah
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/bwees/cah-discord
              tag: latest@sha256:7d210b4044ddc6d5ce94bcde2cf7ab5b77e318af6b5ebc136fa3a9d2c7ac4ed4
            envFrom:
              - secretRef:
                  name: cah-secret
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi

    persistence:
      cards:
        existingClaim: cah-cards
        globalMounts:
          - path: /etc/app/cards
