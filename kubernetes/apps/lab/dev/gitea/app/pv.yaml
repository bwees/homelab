# Gitea data lives on the NAS (compose: nas.bwees.lab:/mnt/main/homelab/gitea).
# The NAS exports /mnt/main/homelab as its root, so the path here is /gitea —
# mirroring how media-library maps /mnt/main/homelab/media -> :/media.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nas-gitea
spec:
  capacity:
    storage: 100Gi
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - nolock
    - soft
  nfs:
    server: 100.80.89.123
    path: /gitea
