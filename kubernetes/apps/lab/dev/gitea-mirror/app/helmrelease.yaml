apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea-mirror
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: gitea-mirror
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/raylabshq/gitea-mirror
              tag: "v3.19.0"
            envFrom:
              - secretRef:
                  name: gitea-mirror-secret
            env:
              BETTER_AUTH_URL: https://gitea-mirror.bwees.lab
              BETTER_AUTH_TRUSTED_ORIGINS: https://gitea-mirror.bwees.lab
              PUBLIC_BETTER_AUTH_URL: https://gitea-mirror.bwees.lab
              NODE_ENV: production
              DATABASE_URL: file:data/gitea-mirror.db
              HOST: 0.0.0.0
              PORT: "4321"
              MIRROR_ISSUE_CONCURRENCY: "1"
              MIRROR_PULL_REQUEST_CONCURRENCY: "1"
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: 4321
            appProtocol: kubernetes.io/ws

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - gitea-mirror.bwees.lab
        rules:
          - backendRefs:
              - identifier: main
                port: 4321

    persistence:
      data:
        existingClaim: gitea-mirror-data
        globalMounts:
          - path: /app/data
