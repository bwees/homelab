---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  prune: true
  # wait so the operator + CRDs (Cluster, Database) are healthy before any app
  # that depends on a CNPG Cluster reconciles.
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/lab/operators/cloudnative-pg/app
  targetNamespace: operators
