apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-dns
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cloudflare-api-token
    template:
      data:
        CF_API_TOKEN: "{{ .dns.CF_API_TOKEN }}"
        CF_ZONE_ID: "{{ .dns.CF_ZONE_ID }}"
  
  dataFrom:
    - extract:
        key: cloudflare
