---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  # wait so the controller is up and the Gateway API + EnvoyProxy CRDs are
  # installed before the GatewayClass/Gateway/HTTPRoute config applies
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/lab/network/envoy-gateway/app
  targetNamespace: network
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway-config
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: false
  dependsOn:
    - name: envoy-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/lab/network/envoy-gateway/config
  # no targetNamespace: GatewayClass is cluster-scoped; the namespaced
  # EnvoyProxy/Gateway/HTTPRoute resources pin namespace per-manifest.
