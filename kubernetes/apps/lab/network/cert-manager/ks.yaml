---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  prune: true
  # wait so the webhook + CRDs are healthy before the issuers/certs apply
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/lab/network/cert-manager/app
  targetNamespace: network
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-issuers
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: false
  dependsOn:
    - name: cert-manager
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/lab/network/cert-manager/issuers
  # no targetNamespace: this path mixes a cluster-scoped ClusterIssuer with
  # namespaced resources; namespaces are pinned per-manifest instead.
