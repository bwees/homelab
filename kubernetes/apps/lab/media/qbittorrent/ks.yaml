apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qbittorrent
spec:
  interval: 1h
  path: ./kubernetes/apps/lab/media/qbittorrent/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: democratic-csi
      namespace: storage
    - name: media-library
    # qbittorrent now runs its own kernel-mode tailscale sidecar instead of using
    # the standalone SOCKS5 proxy, so it no longer depends on the tailscale app.
  targetNamespace: media
