apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: qbittorrent
  values:
    controllers:
      main:
        initContainers:
          # Runs before the app + tailscale containers (shared pod netns) and adds
          # explicit routes for the cluster pod/service CIDRs via the pod's normal
          # gateway. The tailscale exit-node client installs an
          # `ip rule ... suppress_prefixlength 0` that diverts only the *default*
          # route into the tunnel, so these more specific routes keep cluster
          # traffic (e.g. WebUI replies to envoy on another node, probes) on eth0
          # while everything else egresses through the exit node.
          route-setup:
            image:
              repository: busybox
              tag: "1.38"
            command: ["/bin/sh", "-c"]
            args:
              - |
                GW=$(ip route show default | awk '{print $3}' | head -n1)
                echo "pod default gateway: $GW"
                ip route add 10.42.0.0/16 via "$GW" 2>/dev/null || true
                ip route add 10.43.0.0/16 via "$GW" 2>/dev/null || true
                ip route show
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              capabilities:
                add: ["NET_ADMIN"]
        containers:
          main:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: "5.2.1"
            env:
              TZ: America/Chicago
              QBITTORRENT_DOWNLOAD_PATH: /downloads
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
          tailscale:
            image:
              repository: tailscale/tailscale
              tag: "v1.98.4"
            env:
              TZ: America/Chicago
              TS_USERSPACE: "false"
              TS_EXTRA_ARGS: "--reset --exit-node=100.82.151.77 --exit-node-allow-lan-access=true --hostname=qbittorrent"
              TS_STATE_DIR: /var/lib/tailscale
              TS_KUBE_SECRET: ""
              TS_ACCEPT_DNS: "false"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              capabilities:
                add: ["NET_ADMIN", "NET_RAW"]
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 1.1.1.1
          - 1.0.0.1

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
            appProtocol: kubernetes.io/ws

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - bittorrent.bwees.lab
        rules:
          - backendRefs:
              - identifier: main
                port: 8080

    persistence:
      config:
        existingClaim: qbittorrent-config
        globalMounts:
          - path: /config
      media:
        existingClaim: media-library
        globalMounts:
          - path: /downloads
            subPath: downloads
      tailscale-state:
        existingClaim: qbittorrent-tailscale-state
        advancedMounts:
          main:
            tailscale:
              - path: /var/lib/tailscale
      dev-net-tun:
        type: hostPath
        hostPath: /dev/net/tun
        advancedMounts:
          main:
            tailscale:
              - path: /dev/net/tun
