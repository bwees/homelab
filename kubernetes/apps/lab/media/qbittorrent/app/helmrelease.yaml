apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: qbittorrent
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: "5.2.1"
            env:
              TZ: America/Chicago
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
            appProtocol: kubernetes.io/ws

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - bittorrent.bwees.lab
        rules:
          - backendRefs:
              - identifier: main
                port: 8080

    persistence:
      config:
        existingClaim: qbittorrent-config
        globalMounts:
          - path: /config
      # Only the downloads subfolder of the NAS media share is mounted, keeping
      # completed torrents on the NAS so the *arr apps can hardlink imports
      # (tv/movies live on the same share, so cross-folder links stay on one fs).
      media:
        existingClaim: media-library
        globalMounts:
          - path: /downloads
            subPath: downloads
