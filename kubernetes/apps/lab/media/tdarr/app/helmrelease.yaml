apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tdarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: tdarr
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/haveagitgat/tdarr
              tag: "2.77.01"
            env:
              TZ: America/Chicago
              PUID: "1000"
              PGID: "1000"
              UMASK_SET: "002"
              serverIP: 0.0.0.0
              serverPort: "8266"
              webUIPort: "8265"
              internalNode: "true"
              inContainer: "true"
              ffmpegVersion: "7"
              nodeName: homelab-bwees
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: 8265
            appProtocol: kubernetes.io/ws
          # Processing-node port; exposed so external Tdarr nodes can attach.
          server:
            port: 8266

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - tdarr.bwees.lab
        rules:
          - backendRefs:
              - identifier: main
                port: 8265

    persistence:
      config:
        existingClaim: tdarr-config
        globalMounts:
          - path: /app/server
            subPath: server
          - path: /app/configs
            subPath: configs
          - path: /app/logs
            subPath: logs
      # tv, movies and the transcode cache live on the NAS media share, each
      # mounted by subPath to match the old compose layout (/temp = tdarr-cache).
      media:
        existingClaim: media-library
        globalMounts:
          - path: /tv
            subPath: tv
          - path: /movies
            subPath: movies
          - path: /temp
            subPath: tdarr-cache
