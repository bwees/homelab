apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tdarr
spec:
  interval: 1h
  path: ./kubernetes/apps/lab/media/tdarr/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: democratic-csi
      namespace: storage
    - name: media-library
    - name: intel-device-plugins
      namespace: operators
  targetNamespace: media
