apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: audiobookshelf
spec:
  interval: 1h
  path: ./kubernetes/apps/lab/media/audiobookshelf/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: longhorn
      namespace: storage
    - name: volsync
      namespace: storage
    - name: onepassword
      namespace: external-secrets
    - name: media-library
  components:
    - ../../../../../components/volsync
  postBuild:
    substitute:
      APP: audiobookshelf
      VOLSYNC_CLAIM: audiobookshelf-config
  targetNamespace: media
