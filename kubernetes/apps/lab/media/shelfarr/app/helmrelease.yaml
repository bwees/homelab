apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: shelfarr
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/pedro-revez-silva/shelfarr
              tag: latest
            env:
              SOLID_QUEUE_IN_PUMA: "1"
              PUID: "1000"
              PGID: "1000"
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
            appProtocol: kubernetes.io/ws

    route:
      main:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - shelfarr.bwees.lab
        rules:
          - backendRefs:
              - identifier: main
                port: 3000

    persistence:
      config:
        existingClaim: shelfarr-config
        globalMounts:
          - path: /rails/storage
      # audiobooks and downloads live on the NAS media share, each mounted by
      # subPath to match the old compose layout.
      media:
        existingClaim: media-library
        globalMounts:
          - path: /audiobooks
            subPath: audiobooks
          - path: /downloads
            subPath: downloads
