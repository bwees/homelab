apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shelfarr
spec:
  interval: 1h
  path: ./kubernetes/apps/lab/media/shelfarr/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: democratic-csi
      namespace: storage
    - name: media-library
    - name: tailscale
  targetNamespace: media
