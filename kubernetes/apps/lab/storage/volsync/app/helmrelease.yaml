---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
spec:
  interval: 1h
  chart:
    spec:
      chart: volsync
      version: 0.16.0
      sourceRef:
        kind: HelmRepository
        name: backube
        namespace: storage
  values:
    manageCRDs: true
    tolerations:
      - key: dedicated
        operator: Equal
        value: storage
        effect: NoSchedule
