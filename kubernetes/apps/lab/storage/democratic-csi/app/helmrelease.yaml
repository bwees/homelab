apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi
spec:
  interval: 1h
  chart:
    spec:
      chart: democratic-csi
      version: "0.15.1"
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: storage
  values:
    csiDriver:
      name: org.democratic-csi.local-hostpath
      attachRequired: false
      storageCapacity: true
      fsGroupPolicy: File

    storageClasses:
      - name: local-hostpath
        defaultClass: false
        reclaimPolicy: Delete
        volumeBindingMode: WaitForFirstConsumer
        allowVolumeExpansion: false 
        parameters: {}
        mountOptions: []

    volumeSnapshotClasses: []

    controller:
      enabled: true
      strategy: node              
      externalProvisioner:
        extraArgs:
          - --leader-election=false
          - --node-deployment=true
          - --node-deployment-immediate-binding=true
          - --feature-gates=Topology=true
          - --strict-topology=true
          - --enable-capacity=true
          - --capacity-ownerref-level=1
      externalAttacher:
        enabled: false                   
      externalResizer:
        enabled: false
      externalSnapshotter:
        enabled: false                     

    node:
      driver:
        extraVolumeMounts:
          - name: local-storage
            mountPath: /storage
            mountPropagation: Bidirectional
      extraVolumes:
        - name: local-storage
          hostPath:
            path: /storage
            type: DirectoryOrCreate

    driver:
      config:                          
        driver: local-hostpath
        instance_id:
        local-hostpath:
          shareBasePath: "/storage"
          controllerBasePath: "/storage"
          dirPermissionsMode: "0777"
          dirPermissionsUser: 0
          dirPermissionsGroup: 0
        _private:
          csi:
            volume:
              idTemplate: "{{ parameters.[csi.storage.k8s.io/pvc/name] }}-{{ name }}"
