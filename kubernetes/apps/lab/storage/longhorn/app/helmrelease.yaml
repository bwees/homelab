---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: "1.12.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: storage
  values:
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: 2
      # only nodes labelled node.longhorn.io/create-default-disk=true get a disk
      # (grace + rocky via nix --node-label); astrophage stays storage-free
      createDefaultDiskLabeledNodes: true
      # force the 2 replicas onto distinct nodes
      replicaSoftAntiAffinity: false
      storageMinimalAvailablePercentage: 15

    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
      reclaimPolicy: Retain

    # manager + driver-deployer are DaemonSets/Deployments that must run on the
    # tainted astrophage too; they hold no replicas (no default disk there)
    longhornManager:
      tolerations:
        - key: dedicated
          operator: Equal
          value: storage
          effect: NoSchedule
    longhornDriver:
      tolerations:
        - key: dedicated
          operator: Equal
          value: storage
          effect: NoSchedule

    csi:
      attacherReplicaCount: 2
      provisionerReplicaCount: 2
      resizerReplicaCount: 2
      snapshotterReplicaCount: 2
