---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: immich
  values:
    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi

    immich:
      persistence:
        library:
          existingClaim: immich-library

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      main:
        containers:
          main:
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - NET_RAW
            env:
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-app
                    key: host
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-app
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-app
                    key: password
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-app
                    key: dbname
              TZ: America/Chicago
            image:
              # renovate: datasource=github-releases depName=immich-app/immich
              tag: "v2.7.5"

    server:
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 100m
                  memory: 1.5Gi
                limits:
                  memory: 3Gi
      route:
        main:
          parentRefs:
            - name: envoy-external
              namespace: network
            - name: envoy-internal
              namespace: network
          hostnames:
            - photos.bwees.io
            - immich.bwees.lab
          rules:
            - backendRefs:
                - identifier: main
                  port: 2283

    machine-learning:
      controllers:
        main:
          strategy: Recreate
          containers:
            main:
              image:
                # renovate: datasource=github-releases depName=immich-app/immich
                tag: v2.7.5
              env:
                GUNICORN_CMD_ARGS: "--no-control-socket"
              resources:
                requests:
                  cpu: 100m
                  memory: 2Gi

      persistence:
        cache:
          existingClaim: immich-ml-cache