apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-config
  namespace: automation
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-hostpath
  resources:
    requests:
      storage: 10Gi
---
# Binary-data scratch dir shared between the n8n broker and the runner. Both run
# in the same pod, so a single RWO claim mounted into both containers is fine.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-runner-files
  namespace: automation
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-hostpath
  resources:
    requests:
      storage: 5Gi
