apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: n8n-secret
    template:
      data:
        # Shared between the n8n broker (main) and the external task runner.
        N8N_RUNNERS_AUTH_TOKEN: "{{ .runner_secret }}"
  dataFrom:
    - extract:
        key: n8n
