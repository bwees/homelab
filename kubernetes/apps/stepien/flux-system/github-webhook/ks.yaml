apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: github-webhook
spec:
  interval: 1h
  path: ./kubernetes/apps/stepien/flux-system/github-webhook/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: onepassword
      namespace: external-secrets
    - name: envoy-gateway
      namespace: network
  targetNamespace: flux-system
