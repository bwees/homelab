---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
spec:
  interval: 1h
  chart:
    spec:
      chart: metrics-server
      version: '3.13.1'
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: operators
  values:
    # k3s kubelets serve metrics with a self-signed cert, so skip verification.
    args:
      - --kubelet-insecure-tls
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 256Mi
