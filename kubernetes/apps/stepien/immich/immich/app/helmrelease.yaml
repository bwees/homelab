---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: immich
  values:
    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi

    immich:
      persistence:
        library:
          existingClaim: immich-library

    defaultPodOptions:
      securityContext:
        # stepien's NAS (Synology, NFSv4 ACLs) only grants the mapped root user,
        # and the existing immich library is owned by root — the old compose stack
        # ran immich as root (it set no `user:`). Run as root here to keep write
        # access to the library; uid 1000 is denied even on mode-777 dirs.
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44
          - 303

    controllers:
      main:
        containers:
          main:
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - NET_RAW
            env:
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: host
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: password
              TZ: America/New_York
            image:
              # renovate: datasource=docker depName=ghcr.io/immich-app/immich-server
              tag: 'v3.0.2'

    server:
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 100m
                  memory: 1.5Gi
                limits:
                  memory: 3Gi
                  gpu.intel.com/i915: '1'
      route:
        main:
          parentRefs:
            - name: envoy-external
              namespace: networking
          hostnames:
            - stepien-immich.bwees.io
          rules:
            - backendRefs:
                - identifier: main
                  port: 2283

    machine-learning:
      controllers:
        main:
          strategy: Recreate
          containers:
            main:
              image:
                # renovate: datasource=docker depName=ghcr.io/immich-app/immich-machine-learning
                tag: 'v3.0.2-openvino'
              env:
                GUNICORN_CMD_ARGS: '--no-control-socket'
              resources:
                requests:
                  cpu: 100m
                  memory: 2Gi
                limits:
                  memory: 4Gi
                  gpu.intel.com/i915: '1'

      persistence:
        cache:
          type: persistentVolumeClaim
          existingClaim: immich-ml-cache
