apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library
spec:
  capacity:
    storage: 1Ti
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ''
  mountOptions:
    - nfsvers=4.1
    - nolock
    - soft
  nfs:
    server: 10.0.0.80
    path: /volume1/immich/library
