---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-restic-b2
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ${APP}-restic-b2
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # restic over the B2 S3-compatible endpoint; per-app repo subpath
        RESTIC_REPOSITORY: '{{ .repository }}/${CLUSTER}/${APP}'
        RESTIC_PASSWORD: '{{ .repo_password }}'
        AWS_ACCESS_KEY_ID: '{{ .key_id }}'
        AWS_SECRET_ACCESS_KEY: '{{ .application_key }}'
  dataFrom:
    - extract:
        key: restic-b2

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-restic-nas
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ${APP}-restic-nas
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RESTIC_REPOSITORY: 'rest:https://{{ .username }}:{{ .credential }}@restic.bwees.lab/${CLUSTER}/${APP}'
        RESTIC_PASSWORD: '{{ .repo_password }}'
  dataFrom:
    - extract:
        key: restic-nas

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-restic-nas-ca
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ${APP}-restic-nas-ca
    creationPolicy: Owner
  data:
    - secretKey: ca.crt
      remoteRef:
        key: certificate-authority/bwees-ca.crt
