---
# Nightly restic backup of ${VOLSYNC_CLAIM} to BACKBLAZE B2 (offsite).
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: ${APP}-b2
spec:
  sourcePVC: ${VOLSYNC_CLAIM}
  trigger:
    schedule: "${VOLSYNC_SCHEDULE_B2:=0 2 * * *}"
  restic:
    repository: ${APP}-restic-b2
    # snapshot the longhorn PVC so the app keeps running during the backup
    copyMethod: Snapshot
    volumeSnapshotClassName: "${VOLSYNC_SNAPSHOTCLASS:=longhorn}"
    cacheStorageClassName: "${VOLSYNC_STORAGECLASS:=longhorn}"
    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:=2Gi}"
    moverSecurityContext:
      runAsUser: ${VOLSYNC_UID:=1000}
      runAsGroup: ${VOLSYNC_GID:=1000}
      fsGroup: ${VOLSYNC_GID:=1000}
    pruneIntervalDays: 7
    retain:
      daily: 7
      weekly: 2
      monthly: 2
      yearly: 1
