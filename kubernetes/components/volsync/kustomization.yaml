---
# yaml-language-server: $schema=https://json.schemastore.org/component.json
# Reusable restic backup for a single Longhorn PVC -> B2 (offsite) + NAS (local).
#
# Consume from an app's ks.yaml:
#
#   components:
#     - ../../../../../components/volsync
#   postBuild:
#     substitute:
#       APP: n8n                 # required: names the Secrets/ReplicationSources + repo subpath
#       VOLSYNC_CLAIM: n8n-config  # optional: defaults to ${APP}-config
#       # VOLSYNC_CACHE_CAPACITY: 8Gi
#       # VOLSYNC_SCHEDULE_B2: "0 2 * * *"
#       # VOLSYNC_SCHEDULE_NAS: "0 3 * * *"
#
# Do NOT add this to cache/scratch volumes (e.g. immich-ml-cache) — those get a
# plain Longhorn PVC with no ReplicationSource.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - ./externalsecret.yaml
  - ./replicationsource.yaml
