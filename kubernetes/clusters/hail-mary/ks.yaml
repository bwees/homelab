apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: false
  dependsOn:
    - name: apps-base
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/hail-mary
  patches:
    - target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          postBuild:
            substitute:
              CLUSTER: hail-mary
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                    remediation:
                      retries: -1
                  upgrade:
                    crds: CreateReplace
                    cleanupOnFail: true
                    remediation:
                      retries: 3
                      remediateLastFailure: true
                  rollback:
                    cleanupOnFail: true
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease

            - patch: |-
                apiVersion: source.toolkit.fluxcd.io/v1
                kind: OCIRepository
                metadata:
                  name: _
                spec:
                  layerSelector:
                    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
                    operation: copy
              target:
                group: source.toolkit.fluxcd.io
                kind: OCIRepository
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-base
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/base
  patches:
    - target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          postBuild:
            substitute:
              CLUSTER: hail-mary
              LONGHORN_DATA_REPLICAS: "2"
              LONGHORN_CSI_REPLICAS: "2"
              MIROIR_DATA_REPLICAS: '"2"'
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                    remediation:
                      retries: -1
                  upgrade:
                    crds: CreateReplace
                    cleanupOnFail: true
                    remediation:
                      retries: 3
                      remediateLastFailure: true
                  rollback:
                    cleanupOnFail: true
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease

            - patch: |-
                apiVersion: source.toolkit.fluxcd.io/v1
                kind: OCIRepository
                metadata:
                  name: _
                spec:
                  layerSelector:
                    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
                    operation: copy
              target:
                group: source.toolkit.fluxcd.io
                kind: OCIRepository
