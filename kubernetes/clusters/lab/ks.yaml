apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/lab
  patches:
    # Inject HelmRelease defaults into every child Kustomization so each app's
    # HelmReleases manage their own CRDs and self-heal transient failures (e.g. an
    # HTTPRoute applied before the Gateway API CRDs exist). This is why apps don't
    # need a per-app dependsOn on the gateway. Mirrors onedr0p's cluster-apps patch.
    - target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          patches:
            - target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
              patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                    remediation:
                      retries: -1
                  upgrade:
                    crds: CreateReplace
                    cleanupOnFail: true
                    remediation:
                      retries: 3
                      remediateLastFailure: true
                  rollback:
                    cleanupOnFail: true
