apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/lab
  patches:
    - target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          postBuild:
            substitute:
              CLUSTER: hail-mary
          patches:
            - target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
              patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                    remediation:
                      retries: -1
                  upgrade:
                    crds: CreateReplace
                    cleanupOnFail: true
                    remediation:
                      retries: 3
                      remediateLastFailure: true
                  rollback:
                    cleanupOnFail: true
