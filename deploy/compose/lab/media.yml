name: media

networks:
  bwees_traefik_backend:
    external: true

volumes:
  nas-media:
    driver: local
    driver_opts:
      type: 'nfs'
      o: 'addr=nas.bwees.lab,nolock,soft,rw'
      device: ':/mnt/main/homelab/media'
  nas-homelab:
    driver: local
    driver_opts:
      type: 'nfs'
      o: 'addr=nas.bwees.lab,nolock,soft,rw'
      device: ':/mnt/main/homelab'
#
# NFS Subdirectory Mounts
#
x-nas-media-tv: &nas-media-tv
  type: volume
  source: nas-media
  target: /tv
  volume:
    subpath: tv

x-nas-media-movies: &nas-media-movies
  type: volume
  source: nas-media
  target: /movies
  volume:
    subpath: movies

x-nas-media-audiobooks: &nas-media-audiobooks
  type: volume
  source: nas-media
  target: /audiobooks
  volume:
    subpath: audiobooks

x-nas-tdarr-cache: &nas-tdarr-cache
  type: volume
  source: nas-media
  target: /temp
  volume:
    subpath: tdarr-cache

x-nas-qbt: &nas-qbt-folder
  type: volume
  source: nas-media
  target: /nas
  volume:
    subpath: qbt

services:
  # Tailscale Exit Node Router
  # used for getting container traffic to Mullvad exit node
  # cursed fact: you must subnet route on the host at least one time for this to work
  exitnode:
    image: tailscale/tailscale:v1.98.3
    hostname: media_stack
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'tailscale status']
      interval: 1s
      timeout: 5s
      retries: 60
    environment:
      - TZ=America/Chicago
      - TS_EXTRA_ARGS=--reset --exit-node=100.82.151.77 --exit-node-allow-lan-access=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=false
      - TS_USERSPACE=false
      - TS_TAILSCALED_EXTRA_ARGS=--tun=tailscale0
    volumes:
      - /storage/media/tailscale:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - bwees_traefik_backend
    cap_add:
      - net_admin
      - sys_module
    dns:
      - 100.105.77.106
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.services.bittorrent.loadbalancer.server.port=8080'
      - 'traefik.http.routers.bittorrent.rule=Host(`bittorrent.bwees.lab`)'
      - 'traefik.http.routers.bittorrent.service=bittorrent'
      - 'traefik.http.routers.bittorrent.entrypoints=web,websecure'

      - 'traefik.http.services.radarr.loadbalancer.server.port=7878'
      - 'traefik.http.routers.radarr.rule=Host(`radarr.bwees.lab`)'
      - 'traefik.http.routers.radarr.service=radarr'
      - 'traefik.http.routers.radarr.entrypoints=web,websecure'

      - 'traefik.http.services.sonarr.loadbalancer.server.port=8989'
      - 'traefik.http.routers.sonarr.rule=Host(`sonarr.bwees.lab`)'
      - 'traefik.http.routers.sonarr.service=sonarr'
      - 'traefik.http.routers.sonarr.entrypoints=web,websecure'

      - 'traefik.http.services.prowlarr.loadbalancer.server.port=9696'
      - 'traefik.http.routers.prowlarr.rule=Host(`prowlarr.bwees.lab`)'
      - 'traefik.http.routers.prowlarr.service=prowlarr'
      - 'traefik.http.routers.prowlarr.entrypoints=web,websecure'

      - 'traefik.http.services.shelfarr.loadbalancer.server.port=3000'
      - 'traefik.http.routers.shelfarr.rule=Host(`shelfarr.bwees.lab`)'
      - 'traefik.http.routers.shelfarr.service=shelfarr'
      - 'traefik.http.routers.shelfarr.entrypoints=web,websecure'

  qbittorrent:
    image: linuxserver/qbittorrent:5.2.0
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - WEBUI_PORT=8080
    volumes:
      - /storage/media/qbittorrent:/config
      - /storage/media/downloads:/downloads
      - <<: *nas-qbt-folder
    network_mode: service:exitnode
    depends_on:
      - exitnode
    restart: unless-stopped
    # Traefik config defined at exitnode

  jellyfin:
    image: linuxserver/jellyfin:10.11.9
    volumes:
      - /storage/media/jellyfin:/config
      - <<: *nas-media-tv
      - <<: *nas-media-movies

    environment:
      - JELLYFIN_PublishedServerUrl=jellyfin.bwees.lab
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    ports:
      - 7359:7359/udp
      - 1900:1900/udp
    networks:
      - bwees_traefik_backend
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.services.jellyfin.loadbalancer.server.port=8096'

      - 'traefik.http.routers.jellyfin.rule=Host(`jellyfin.bwees.lab`) || Host(`jellyfin.bwees.io`)'
      - 'traefik.http.routers.jellyfin.service=jellyfin'
      - 'traefik.http.routers.jellyfin.entrypoints=web,websecure'
    devices:
      - '/dev/dri:/dev/dri'

    restart: unless-stopped

  ###########
  ## ARR Apps
  ###########

  radarr:
    image: linuxserver/radarr:6.1.1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /storage/media/radarr:/config
      - /storage/media/downloads:/downloads
      - <<: *nas-media-movies
    network_mode: service:exitnode
    depends_on:
      - exitnode
    restart: unless-stopped
    # Traefik config defined at exitnode

  sonarr:
    image: ghcr.io/linuxserver/sonarr:4.0.17
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /storage/media/sonarr:/config
      - /storage/media/downloads:/downloads
      - <<: *nas-media-tv
    network_mode: service:exitnode
    depends_on:
      - exitnode
    restart: unless-stopped
    # Traefik config defined at exitnode

  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:2.3.5
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /storage/media/prowlarr:/config
    network_mode: service:exitnode
    depends_on:
      - exitnode
    restart: unless-stopped
    # Traefik config defined at exitnode

  seerr:
    image: ghcr.io/seerr-team/seerr:v3.2.0
    environment:
      - TZ=America/Chicago
      - PORT=5055
    volumes:
      - /storage/media/seerr:/app/config
    restart: unless-stopped
    networks:
      - bwees_traefik_backend
    labels:
      - 'traefik.enable=true'

      - 'traefik.http.services.seerr.loadbalancer.server.port=5055'
      - 'traefik.http.routers.seerr.rule=Host(`seerr.bwees.lab`)'
      - 'traefik.http.routers.seerr.service=seerr'
      - 'traefik.http.routers.seerr.entrypoints=web,websecure'

  tdarr:
    image: ghcr.io/haveagitgat/tdarr:2.74.01
    restart: unless-stopped
    networks:
      - bwees_traefik_backend
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.services.tdarr.loadbalancer.server.port=8265'

      - 'traefik.http.routers.tdarr.rule=Host(`tdarr.bwees.lab`)'
      - 'traefik.http.routers.tdarr.service=tdarr'
      - 'traefik.http.routers.tdarr.entrypoints=web,websecure'
    environment:
      - TZ=America/Chicago
      - PUID=1000
      - PGID=1000
      - UMASK_SET=002
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - inContainer=true
      - ffmpegVersion=7
      - nodeName=homelab-bwees
    volumes:
      - /storage/media/tdarr/server:/app/server
      - /storage/media/tdarr/configs:/app/configs
      - /storage/media/tdarr/logs:/app/logs

      # Libraries
      - <<: *nas-media-tv
      - <<: *nas-media-movies
      - <<: *nas-tdarr-cache
    ports:
      - 8266:8266
    devices:
      - /dev/dri:/dev/dri

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    restart: unless-stopped
    network_mode: service:exitnode
    depends_on:
      - exitnode

  shelfarr:
    image: ghcr.io/pedro-revez-silva/shelfarr:latest
    restart: unless-stopped
    network_mode: service:exitnode
    depends_on:
      - exitnode
    volumes:
      - /storage/media/shelfarr:/rails/storage
      - <<: *nas-media-audiobooks
      - /storage/media/downloads:/downloads
    environment:
      - SOLID_QUEUE_IN_PUMA=1
      - PUID=1000
      - PGID=1000

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    restart: unless-stopped
    networks:
      - bwees_traefik_backend
    volumes:
      - <<: *nas-media-audiobooks
      - /storage/media/audiobookshelf/config:/config
      - /storage/media/audiobookshelf/metadata:/metadata
    environment:
      - TZ=America/Chicago
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.services.audiobookshelf.loadbalancer.server.port=80'

      - 'traefik.http.routers.audiobookshelf.rule=Host(`audiobookshelf.bwees.lab`)'
      - 'traefik.http.routers.audiobookshelf.service=audiobookshelf'
      - 'traefik.http.routers.audiobookshelf.entrypoints=web,websecure'
