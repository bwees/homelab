[tools]
opentofu = "1.12.5"

[task_config]
includes = ["nixos/mise.toml"]

[tasks.bootstrap]
usage = '''
arg "host"
arg "user" default="bwees"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

# Ensure the secrets namespace exists
ssh "$usage_user@$usage_host" 'sudo k3s kubectl create namespace secrets \
  --dry-run=client -o yaml | sudo k3s kubectl apply -f -'

# 1Password Connect credentials + access token -> secrets secret on the host
token=$(op read --no-newline "op://Homelab Deployment/1password-connect/credentials/access_token" | base64 | tr -d '\n')
creds=$(op read --no-newline "op://Homelab Deployment/1password-connect/credentials/1password-credentials.json" | base64 | tr -d '\n')

cat <<EOF | ssh "$usage_user@$usage_host" 'sudo k3s kubectl apply -f -'
apiVersion: v1
kind: Secret
metadata:
  name: onepassword-connect-secret
  namespace: secrets
type: Opaque
data:
  token: $token
  1password-credentials.json: $creds
EOF
'''
